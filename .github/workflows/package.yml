name: Package PurePress

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  package:
    name: Build installable plugin package
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.version.outputs.version }}
      zip_name: ${{ steps.version.outputs.zip_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Resolve plugin version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          plugin_version="$(php -r '
          $plugin = file_get_contents("purepress.php");
          if (! preg_match("/^\\s*\\*\\s*Version:\\s*([^\\s]+)/m", $plugin, $matches)) {
              fwrite(STDERR, "Unable to read plugin version from purepress.php\n");
              exit(1);
          }
          echo $matches[1];
          ')"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"

            if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\\.[0-9]+\\.[0-9]+$ ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match release pattern v*.*.*." >&2
              exit 1
            fi

            if [[ "${plugin_version}" != "${version}" ]]; then
              php -r '
              [$file, $version] = [$argv[1], $argv[2]];
              $plugin = file_get_contents($file);
              $plugin = preg_replace("/(^\\s*\\*\\s*Version:\\s*)[^\\s]+/m", "\${1}" . $version, $plugin, 1);
              $plugin = preg_replace("/define\\(\\s*'\''PUREPRESS_VERSION'\''\\s*,\\s*'\''[^'\'']+'\''\\s*\\);/", "define('\''PUREPRESS_VERSION'\'', '\''" . $version . "'\'');", $plugin, 1);
              file_put_contents($file, $plugin);
              ' purepress.php "${version}"
            fi

            package_version="${GITHUB_REF_NAME}"
          else
            version="${plugin_version}"
            package_version="manual-${version}-${GITHUB_RUN_NUMBER}"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "zip_name=purepress-${package_version}.zip" >> "${GITHUB_OUTPUT}"

      - name: Build plugin zip
        shell: bash
        run: |
          set -euo pipefail

          rm -rf build dist
          mkdir -p build/purepress dist

          rsync -a ./ build/purepress/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.idea/' \
            --exclude 'build/' \
            --exclude 'dist/' \
            --exclude 'AGENT.md' \
            --exclude '*.log'

          cd build
          zip -qr "../dist/${{ steps.version.outputs.zip_name }}" purepress

      - name: Upload installable plugin artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: purepress-installable-${{ steps.version.outputs.version }}
          path: build
          if-no-files-found: error

      - name: Upload release package artifact
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: actions/upload-artifact@v7
        with:
          name: purepress-release-package
          path: dist/${{ steps.version.outputs.zip_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push' && github.ref_type == 'tag'
    permissions:
      contents: write

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: purepress-release-package
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ needs.package.outputs.zip_name }}
          generate_release_notes: true
